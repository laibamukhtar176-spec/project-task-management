<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allied Software Engineers - Project Management</title>
  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="login-container" class="auth-card">
        <h2>Employee Login</h2>
        <form id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" required>
            </div>
            <p id="login-error" class="error-text hidden">Invalid email or password.</p>
            <button type="submit" class="btn">Login</button>
        </form>
    </div>

    <div id="app-container" class="hidden">
        <header>
            <h1>Project & Task Management</h1>
            <button id="logout-btn" class="btn-secondary">Logout</button>
        </header>

        <section class="dashboard-metrics">
            <div class="card">Total Projects: <span id="metric-total-projects">0</span></div>
            <div class="card">Completed Tasks: <span id="metric-completed">0</span></div>
            <div class="card">Pending Tasks: <span id="metric-pending">0</span></div>
            <div class="card card-alert">Overdue Tasks: <span id="metric-overdue">0</span></div>
        </section>

        <div class="main-layout">
            <section class="form-section">
                <h3>Create New Task</h3>
                <form id="task-form">
                    <input type="text" id="task-title" placeholder="Task Title" required>
                    <input type="text" id="task-assignee" placeholder="Assigned Employee" required>
                    
                    <select id="task-priority">
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                    
                    <select id="task-status">
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Completed">Completed</option>
                    </select>

                    <label>Start Date</label>
                    <input type="date" id="task-start" required>
                    
                    <label>Due Date</label>
                    <input type="date" id="task-due" required>

                    <button type="submit" class="btn">Add Task</button>
                </form>
            </section>

            <section class="list-section">
                <h3>Tasks</h3>
                <div class="filters">
                    <input type="text" id="search-employee" placeholder="Search by Employee...">
                    <select id="filter-priority">
                        <option value="All">All Priorities</option>
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                    <select id="filter-status">
                        <option value="All">All Statuses</option>
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
                
                <table class="task-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Assignee</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Due Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="task-list-body">
                        </tbody>
                </table>
            </section>
        </div>

        <section class="reports-section">
            <h3>Project Progress Report</h3>
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar">0%</div>
            </div>
            <p id="report-summary"></p>
        </section>
    </div>

    <script src="app.js"></script>

    <script src="js/app.js"></script>
</body>
</html>
